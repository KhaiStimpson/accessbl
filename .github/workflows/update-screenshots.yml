name: Update Screenshots

on:
  workflow_dispatch:

concurrency:
  group: update-screenshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Generate screenshots
        run: xvfb-run -a ./gradlew recordRoborazziDebug

      - name: Copy screenshots to docs/
        run: |
          mkdir -p docs/screenshots
          cp app/build/outputs/roborazzi/*.png docs/screenshots/ 2>/dev/null || true

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "chore: update screenshots [skip ci]"
            git push
          fi
